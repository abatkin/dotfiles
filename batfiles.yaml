files:
# 10-download-oh-my-zsh.sh
  - repo: https://github.com/robbyrussell/oh-my-zsh.git
    dest: ~/.oh-my-zsh

# 15-setup-oh-my-zsh.sh
  - glob: /oh-my-zsh/*
    dest: ~/.oh-my-zsh/custom
  - glob: /oh-my-zsh-plugins/*
    dest: ~/.oh-my-zsh/custom/plugins
  - source-list: /zsh-bundles.txt
    dest: ~/.oh-my-zsh/custom/plugins

# 20-setup-vim.shh
  - url: https://raw.githubusercontent.com/tpope/vim-pathogen/master/autoload/pathogen.vim
    dest: ~/.vim/autoload/pathogen.vim
    update: false
  - source: /vim/after
    dest: ~/.vim/after
  - source-list: /vim/bundles.txt
    dest: ~/.vim/bundle

# 30-setup-dotfiles.sh
  - glob: /files/*
    dest: ~
    dot-prefix: true

# 40-setup-binfiles.sh
  - glob: /binfiles/*
    dest: ~/bin

# 50-setup-confs.sh
  - source: /confs/kitty.conf
    dest: ~/.config/kitty/kitty.conf
  - source: /confs/starship.toml
    dest: ~/.config/starship.toml
  - source: /confs/config.rasi
    dest: ~/.config/rofi/config.rasi
  - source: /confs/mise-config.toml
    dest: ~/.config/mise/config.toml
  - source: /nvim
    dest: ~/.config/nvim
  - source: /confs/launch-entries.ini
    dest: ~/.config/launch-entries.ini
    copy: true
    update: false

